<!doctype html>
<html>

<title>블로그 페이지</title>

<head>
    <meta charset="UTP-8">
    <link rel="stylesheet" href="main.css">
</head>

<body>

    <div class='blogBackground'>

        <div class='blogTop'>
            <h3>일기장?</h3>
        </div>

        <div class='blogBasicCenter' id='basic'>
            기본 페이지 입니다.
        </div>


        <div class='blogCenter' id='programming'>
            프로그래밍<br>
            <button onclick="beforePage()">기본 페이지로 이동</button>
        </div>

        <div class='blogCenter' id='daily'>
            일상<br>
            <button onclick="beforePage()">기본 페이지로 이동</button>
        </div>

        <div class='blogCenter' id='books'>
            독서<br>
            <button onclick="beforePage()">기본 페이지로 이동</button>
        </div>


        <div class='blogLeft'>
            <h3>카테고리</h3>
            <ul>

                <li><button onclick="document.getElementById('programming').style.display = 'block';">프로그래밍</button></li>

                <li><button onclick="document.getElementById('daily').style.display = 'block';">일상</button></li>

                <li><button onclick="document.getElementById('books').style.display = 'block';">독서</button></li>

            </ul>
        </div>

    </div>

    <script>

        function beforePage() {

            var elements = document.getElementsByClassName('blogCenter');

            for (var i = 0, length = elements.length; i < length; i++) {
                if (elements[i].className == 'blogCenter') {
                    elements[i].style.display = 'none';
                }
            }
        }

    </script>

</body>

</html>
